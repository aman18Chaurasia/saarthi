[project]
name = "saarthi-persona-gym"
version = "0.1.0"
description = "Synthetic persona generator and batch eval runner"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "httpx>=0.27",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "saarthi-llm-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["persona_gym"]

[tool.uv.sources]
saarthi-llm-client = { workspace = true }
