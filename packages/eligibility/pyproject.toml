[project]
name = "saarthi-eligibility"
version = "0.1.0"
description = "Product eligibility engine backed by Neo4j knowledge graph"
requires-python = ">=3.11"
dependencies = [
    "neo4j>=5.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["eligibility"]
