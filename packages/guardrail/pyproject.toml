[project]
name = "saarthi-guardrail"
version = "0.1.0"
description = "Compliance guardrail: Presidio PII redaction + LLM-as-judge"
requires-python = ">=3.11"
dependencies = [
    "presidio-analyzer>=2.2",
    "presidio-anonymizer>=2.2",
    "spacy>=3.7",
    "httpx>=0.27",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "saarthi-llm-client",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["guardrail"]

[tool.uv.sources]
saarthi-llm-client = { workspace = true }
