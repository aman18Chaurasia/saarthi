# Education Loan call script
# Agent turns must average ≤25 words. Pause markers: <pause:wait_user/>
product: education_loan
version: "0.1"

nodes:
  opener:
    agent: |
      Namaste! Main {agent_name} bol raha hoon, {lender_name} se.
      Kya aap {customer_name} ji bol rahe hain? <pause:wait_user/>

  identity_confirm:
    agent: |
      Thank you ji. Main education loan ke special offers ke baare mein baat karna chahta tha.
      Kya aap ya aapke family mein koi higher studies ka plan hai? Bas 2 minute. <pause:wait_user/>

  qualify:
    agent: |
      Bahut accha! Pehle yeh batayiye — aapki monthly family income kitni hai?
      Parent aur student dono milake, approximately. <pause:wait_user/>
    follow_up:
      agent: |
        Good ji. Aur course kaunsa hai — engineering, MBA, medical, ya abroad study?
        Fees kitni hai approximately aur duration kitna? <pause:wait_user/>

  consent:
    agent: |
      Samajh gaya ji. Main aapko customized education loan offer bhejne ke liye
      basic details record kar sakta hoon? Permission dete hain? <pause:wait_user/>

  next_step:
    agent: |
      Perfect. Main aapko detailed education loan offer bhejunga.
      SMS, WhatsApp, ya email — kaunsa better hai aapke liye? <pause:wait_user/>
    follow_up:
      agent: |
        Great choice! Aur aapka [phone number ya email] kya hai?
        Please type kariye chat mein taaki correct mile. <pause:wait_user/>

  close:
    agent: |
      Thank you {customer_name} ji! Padhai acchi ho, future bright rahe.
      All the best! <pause:end/>
