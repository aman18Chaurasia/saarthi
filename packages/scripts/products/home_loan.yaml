# Home Loan call script
# Agent turns must average ≤25 words. Pause markers: <pause:wait_user/>
product: home_loan
version: "0.1"

nodes:
  opener:
    agent: |
      Namaste! Main {agent_name} bol raha hoon, {lender_name} se.
      Kya aap {customer_name} ji bol rahe hain? <pause:wait_user/>

  identity_confirm:
    agent: |
      Thank you ji. Dekhiye, main aapko ek special home loan offer ke baare mein baat karna chahta tha —
      apna ghar lena ka sapna hai kya? Bas 2 minute lagenge. <pause:wait_user/>

  qualify:
    agent: |
      Bahut accha! Dekhiye, aapki monthly income kitni hai approximately?
      Is se hum dekh sakte hain ki kitna loan mil sakta hai aapko. <pause:wait_user/>
    follow_up:
      agent: |
        Perfect ji. Aur aap kahan property dekh rahe hain — kaunsa area ya city?
        Naya construction hai ya existing flat? Budget kitna hai roughly? <pause:wait_user/>

  consent:
    agent: |
      Main aapko ek tailored offer bhejne ke liye aapki basic details record karna chahta hoon.
      Kya aap consent dete hain? <pause:wait_user/>

  next_step:
    agent: |
      Perfect. Main aapko detailed home loan offer bhejunga.
      SMS, WhatsApp, ya email — kaunsa better hai aapke liye? <pause:wait_user/>
    follow_up:
      agent: |
        Great choice! Aur aapka [phone number ya email] kya hai?
        Please type kariye chat mein taaki correct mile. <pause:wait_user/>

  close:
    agent: |
      Thank you so much {customer_name} ji! Aapka ghar ka sapna jaldi pura ho.
      Have a great day! <pause:end/>
