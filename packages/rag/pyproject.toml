[project]
name = "saarthi-rag"
version = "0.1.0"
description = "RAG pipeline for SAARTHI product brochures and RBI FAQs"
requires-python = ">=3.11"
dependencies = [
    "qdrant-client>=1.9",
    "pypdf>=4.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag"]
