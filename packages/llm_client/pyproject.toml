[project]
name = "saarthi-llm-client"
version = "0.1.0"
description = "LLM provider router for SAARTHI (Groq default, Ollama optional)"
requires-python = ">=3.11"
dependencies = [
    "groq>=0.9",
    "httpx>=0.27",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.4", "mypy>=1.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llm_client"]
