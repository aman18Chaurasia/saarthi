[project]
name = "saarthi-voice"
version = "0.1.0"
description = "TTS provider stubs for SAARTHI (ElevenLabs default, XTTS-v2 via HF Space)"
requires-python = ">=3.11"
dependencies = [
    "elevenlabs>=1.0",
    "httpx>=0.27",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.4", "mypy>=1.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["voice"]
